name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    name: PHP lint + WPCS
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          coverage: none
      - run: composer install --prefer-dist --no-interaction --no-progress
      - run: composer lint
      - run: composer phpcs
